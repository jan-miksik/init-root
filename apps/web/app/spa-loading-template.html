<div style="position:fixed;inset:0;background:#0f1115;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div class="page-loader">
    <div class="page-loader-logo">
      <svg width="120" height="28" viewBox="0 0 120 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="initRoot">
        <text x="0" y="22" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace" font-size="22" font-weight="700" letter-spacing="-0.03em" fill="#e2e8f0">init</text>
        <text x="52" y="22" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,'Liberation Mono','Courier New',monospace" font-size="22" font-weight="700" letter-spacing="-0.03em" fill="#74d38a">Root</text>
      </svg>
    </div>
    <div class="page-loader-track">
      <span class="page-loader-block"></span><span class="page-loader-block"></span><span class="page-loader-block"></span><span class="page-loader-block"></span>
      <span class="page-loader-block"></span><span class="page-loader-block"></span><span class="page-loader-block"></span><span class="page-loader-block"></span>
    </div>
    <!-- <span class="page-loader-label">Loading</span> -->
  </div>
  <style>
    .page-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .page-loader-logo {
      opacity: 0;
      animation: __logo-fade 0.4s ease-out 0.1s forwards;
    }

    @keyframes __logo-fade {
      to { opacity: 1; }
    }

    .page-loader-track {
      display: flex;
      gap: 2px;
    }

    .page-loader-block {
      width: 8px;
      height: 8px;
      background: #2f3540;
      animation: __block-scan 1.6s ease-in-out infinite;
    }

    .page-loader-block:nth-child(1) { animation-delay: 0s; }
    .page-loader-block:nth-child(2) { animation-delay: 0.15s; }
    .page-loader-block:nth-child(3) { animation-delay: 0.3s; }
    .page-loader-block:nth-child(4) { animation-delay: 0.45s; }
    .page-loader-block:nth-child(5) { animation-delay: 0.6s; }
    .page-loader-block:nth-child(6) { animation-delay: 0.75s; }
    .page-loader-block:nth-child(7) { animation-delay: 0.9s; }
    .page-loader-block:nth-child(8) { animation-delay: 1.05s; }

    @keyframes __block-scan {
      0%, 100% { background: #2f3540; opacity: 0.3; }
      25% { background: #74d38a; opacity: 1; }
      50% { background: #2f3540; opacity: 0.3; }
    }

    .page-loader-label {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8e96a3;
    }
  </style>
</div>
