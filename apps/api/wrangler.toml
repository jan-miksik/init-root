# Service-only Worker: do NOT add routes. Access only via Cloudflare Pages Service Binding.
# No custom domain, no workers.dev exposure — keeps the API internal and more secure.
name = "dex-trading-agents-api"
# Built from monorepo root so node_modules and @dex-agents/shared resolve (see build command)
main = "dist/worker.js"
compatibility_date = "2026-02-12"
compatibility_flags = ["nodejs_compat"]

# Build from repo root so all dependencies and workspace packages resolve
[build]
command = "npm run build:worker"
cwd = "../.."

# Local dev: uses local D1 and KV. Production: use [env.production] and deploy with --env production
# Single hourly cron for performance snapshots only.
# Agent analysis is driven by DO alarms (self-scheduling).
[triggers]
crons = ["0 * * * *"]

# Local-only vars — never set PLAYWRIGHT_SECRET in [env.production]
[vars]
PLAYWRIGHT_SECRET = "playwright-dev-secret"

[[d1_databases]]
binding = "DB"
database_name = "trading-agents"
database_id = "local-trading-agents"
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "local-cache"

# Async LLM processing queue.
# LLM_QUEUE is OPTIONAL — when absent the agent-loop falls back to synchronous LLM calls.
# To enable locally: wrangler queues create llm-jobs (then wrangler queues create llm-jobs-dlq)
# The binding is declared but commented out until the queue is created in your account.
# Enable after running: wrangler queues create llm-jobs && wrangler queues create llm-jobs-dlq
[[queues.producers]]
queue = "llm-jobs"
binding = "LLM_QUEUE"
[[queues.consumers]]
queue = "llm-jobs"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "llm-jobs-dlq"

[durable_objects]
bindings = [
  { name = "TRADING_AGENT", class_name = "TradingAgentDO" },
  { name = "AGENT_MANAGER", class_name = "AgentManagerDO" },
  { name = "RATE_LIMITER",  class_name = "GlobalRateLimiterDO" }
]

# Free plan requires SQLite-backed DOs. Add a new [[migrations]] entry when adding a new DO class.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["TradingAgentDO"]
[[migrations]]
tag = "v2"
new_sqlite_classes = ["AgentManagerDO"]
[[migrations]]
tag = "v3"
new_sqlite_classes = ["GlobalRateLimiterDO"]

# Production: create D1 + KV in dashboard, then set database_id and id below. Deploy with: wrangler deploy --env production
# Production queue config
[[env.production.queues.producers]]
queue = "llm-jobs"
binding = "LLM_QUEUE"
[[env.production.queues.consumers]]
queue = "llm-jobs"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "llm-jobs-dlq"

[env.production]
name = "dex-trading-agents-api"
# Replace with your production D1 database_id (from: wrangler d1 list)
[[env.production.d1_databases]]
binding = "DB"
database_name = "trading-agents"
database_id = "0331580c-2b26-4fa1-a35f-57af26e9ea6b"
migrations_dir = "src/db/migrations"
# Replace with your production KV namespace id (from: wrangler kv namespace list)
# Create one with: wrangler kv namespace create CACHE
[[env.production.kv_namespaces]]
binding = "CACHE"
id = "b056ff9b5da14b23b8f4a5076038b783"
[env.production.durable_objects]
bindings = [
  { name = "TRADING_AGENT", class_name = "TradingAgentDO" },
  { name = "AGENT_MANAGER", class_name = "AgentManagerDO" },
  { name = "RATE_LIMITER",  class_name = "GlobalRateLimiterDO" }
]
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["TradingAgentDO"]
[[env.production.migrations]]
tag = "v2"
new_sqlite_classes = ["AgentManagerDO"]
[[env.production.migrations]]
tag = "v3"
new_sqlite_classes = ["GlobalRateLimiterDO"]
